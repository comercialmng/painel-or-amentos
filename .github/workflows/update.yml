name: Atualizar Painel Maneng

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 11:00 BRT
    - cron: '0 20 * * *'   # 20:00 UTC = 17:00 BRT
  workflow_dispatch:        # permite rodar manualmente a qualquer hora

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar dados do Bitrix
        env:
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}
        run: python build_from_bitrix.py

      - name: Injetar dados no HTML
        run: python inject_data.py

      - name: Commit e push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add painel_orcamentos_2026_49.html
          git diff --staged --quiet || git commit -m "Painel atualizado $(date '+%d/%m/%Y %H:%M')"
          git push
